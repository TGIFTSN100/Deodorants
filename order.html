<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Make an Order | FreshAura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=20260402-1">
  <link rel="stylesheet" href="style.css?v=20260402-2">
  <style>
    .order-page {
      padding-bottom: 120px;
      background:
        radial-gradient(circle at 8% 12%, rgba(201, 138, 52, 0.12), transparent 25%),
        radial-gradient(circle at 90% 12%, rgba(33, 77, 82, 0.08), transparent 26%),
        linear-gradient(180deg, #fffdf8 0%, #fbf4e8 100%);
    }

    .order-head {
      max-width: 1100px;
      margin: 1.7rem auto 0;
      text-align: center;
      padding: 0 1rem;
    }

    .order-head h1 {
      font-family: "Playfair Display", serif;
      font-size: clamp(1.7rem, 4vw, 2.7rem);
    }

    .order-head p {
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .order-grid {
      max-width: 1100px;
      margin: 1.1rem auto 1.4rem;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .order-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 252, 246, 0.92));
      border: 1px solid rgba(201, 138, 52, 0.18);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 36px rgba(68, 43, 13, 0.10);
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .order-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 42px rgba(68, 43, 13, 0.14);
    }

    .order-card.selected {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(201, 138, 52, 0.22), 0 18px 36px rgba(68, 43, 13, 0.12);
    }

    .order-card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
    }

    .order-card-body {
      padding: 0.85rem 0.9rem 0.95rem;
    }

    .order-card-title {
      font-weight: 700;
      min-height: 2.4em;
    }

    .order-card-price {
      color: var(--brand-deep);
      font-weight: 800;
      margin-top: 0.35rem;
    }

    .order-check {
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.88rem;
      color: #30363a;
    }

    @media (max-width: 640px) {
      .order-grid {
        gap: 0.75rem;
      }

      .order-card img {
        height: 145px;
      }

      .order-card-body {
        padding: 0.7rem 0.75rem 0.8rem;
      }

      .order-card-title {
        font-size: 0.95rem;
      }

      .order-card-price {
        font-size: 0.94rem;
      }

      .order-check {
        font-size: 0.8rem;
      }
    }

    .order-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1200;
      background: rgba(12, 11, 10, 0.96);
      border-top: 1px solid rgba(201, 138, 52, 0.28);
      padding: 0.8rem 1rem calc(0.8rem + env(safe-area-inset-bottom));
      backdrop-filter: blur(10px);
    }

    .order-bar-wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .order-count {
      color: #f1cf8a;
      font-weight: 700;
      min-width: 130px;
    }

    .order-action,
    .contact-action {
      border: none;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      font-weight: 800;
      letter-spacing: 0.4px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }

    .order-action {
      background: linear-gradient(135deg, #efd28a, #d7a74b);
      color: #162628;
      flex: 1;
      min-width: 210px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    .order-action:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
  </style>
</head>
<body class="order-page">
  <header class="site-header">
    <div class="top-strip">
      <p>Premium Fragrance and Body Care Collections</p>
    </div>

    <div class="brand-row">
      <div class="brand-mark">FreshAura</div>
    </div>
  </header>

  <nav class="menu-nav" aria-label="Main navigation">
    <a href="index.html#home">HOME</a>
    <a href="index.html#about">ABOUT</a>
    <a href="index.html#collection">COLLECTION</a>
    <a href="index.html#appointment">APPOINTMENT</a>
    <a href="index.html#contact">CONTACT</a>
  </nav>

  <main>
    <section class="order-head">
      <h1>Select Products to Order</h1>
      <p>Choose one or more deodorants/perfumes, then click Make an Order.</p>
    </section>

    <section class="order-grid" id="orderGrid" aria-live="polite"></section>
  </main>

  <div class="order-bar">
    <div class="order-bar-wrap">
      <div class="order-count" id="selectedCount">0 selected</div>
      <button class="order-action" id="makeOrderBtn" type="button" disabled>MAKE AN ORDER</button>
    </div>
  </div>

  <script>
    const products = [
      { id: 1, name: "Avon Black Suede", price: "$22.00", image: "images/products/images (1).jfif" },
      { id: 2, name: "Inuka Fresh Deodorant", price: "$8.50", image: "images/products/images (2).jfif" },
      { id: 3, name: "Avon Floral Perfume", price: "$18.00", image: "images/products/images (3).jfif" },
      { id: 4, name: "Sport Shield Deodorant", price: "$9.00", image: "images/products/images (4).jfif" },
      { id: 5, name: "Inuka Cool Body Mist", price: "$10.50", image: "images/products/images (5).jfif" },
      { id: 6, name: "Avon Care Body Lotion", price: "$11.00", image: "images/products/images (6).jfif" },
      { id: 7, name: "Avon Wild Country", price: "$20.00", image: "images/products/images (7).jfif" },
      { id: 8, name: "Inuka Fresh Bloom Lotion", price: "$12.00", image: "images/products/images (8).jfif" },
      { id: 9, name: "Avon Musk Intense", price: "$24.00", image: "images/products/images (9).jfif" },
      { id: 10, name: "Inuka Citrus Mist", price: "$10.00", image: "images/products/images (10).jfif" },
      { id: 11, name: "Avon Elegance Perfume", price: "$26.00", image: "images/products/images (11).jfif" },
      { id: 12, name: "Inuka Body Lotion", price: "$11.50", image: "images/products/images (12).jfif" },
      { id: 13, name: "Avon Midnight Velvet", price: "$30.00", image: "images/products/images (13).jfif" }
    ];

    const selectedProductIds = new Set();
    const orderGrid = document.getElementById("orderGrid");
    const selectedCount = document.getElementById("selectedCount");
    const makeOrderBtn = document.getElementById("makeOrderBtn");
    const whatsappNumber = "263789795764";

    function updateSelectionUI() {
      const count = selectedProductIds.size;
      selectedCount.textContent = `${count} selected`;
      makeOrderBtn.disabled = count === 0;
    }

    function toggleProduct(productId, card, checkbox) {
      if (selectedProductIds.has(productId)) {
        selectedProductIds.delete(productId);
        card.classList.remove("selected");
        checkbox.checked = false;
      } else {
        selectedProductIds.add(productId);
        card.classList.add("selected");
        checkbox.checked = true;
      }

      updateSelectionUI();
    }

    products.forEach((product) => {
      const card = document.createElement("article");
      card.className = "order-card";

      card.innerHTML = `
        <img src="${product.image}" alt="${product.name}">
        <div class="order-card-body">
          <h3 class="order-card-title">${product.name}</h3>
          <p class="order-card-price">${product.price}</p>
          <label class="order-check">
            <input type="checkbox" aria-label="Select ${product.name}">
            <span>Select product</span>
          </label>
        </div>
      `;

      const checkbox = card.querySelector("input");

      card.addEventListener("click", (event) => {
        if (event.target.tagName === "INPUT") return;
        toggleProduct(product.id, card, checkbox);
      });

      checkbox.addEventListener("click", (event) => {
        event.stopPropagation();
        toggleProduct(product.id, card, checkbox);
      });

      orderGrid.appendChild(card);
    });

    makeOrderBtn.addEventListener("click", () => {
      if (selectedProductIds.size === 0) return;

      const selectedProducts = products.filter((product) => selectedProductIds.has(product.id));
      const productLines = selectedProducts.map((product) => `- ${product.name} (${product.price})`).join("\n");
      const message = `Hi, I would like to order these deodorants/perfumes:\n\n${productLines}\n\nPlease assist me with payment and delivery details.`;
      const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

      window.open(whatsappUrl, "_blank", "noopener,noreferrer");
    });

    updateSelectionUI();
  </script>
</body>
</html>
